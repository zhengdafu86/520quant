<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>520量化监控</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 顶栏 -->
<nav class="navbar navbar-dark bg-dark px-3 py-2 sticky-top">
  <span class="navbar-brand fw-bold">📈 520量化</span>
  <span class="text-secondary small" id="refresh-time">--</span>
</nav>

<!-- 账户概览条 -->
<div class="account-bar px-3 py-2" id="account-bar">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <span class="label">总资产</span>
      <span class="value" id="total-assets">--</span>
    </div>
    <div>
      <span class="label">累计收益</span>
      <span class="value" id="total-return">--</span>
    </div>
    <div>
      <span class="label">现金</span>
      <span class="value" id="cash">--</span>
    </div>
  </div>
</div>

<!-- Tab 导航 -->
<ul class="nav nav-tabs nav-fill sticky-tab" id="mainTab">
  <li class="nav-item">
    <a class="nav-link active" data-tab="positions" href="#">📊 持仓</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" data-tab="watchlist" href="#">👁 自选</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" data-tab="scan" href="#">🔍 扫描</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" data-tab="account" href="#">💰 账户</a>
  </li>
</ul>

<!-- 内容区 -->
<div class="tab-content p-3">

  <!-- 持仓 Tab -->
  <div class="tab-pane active" id="tab-positions">
    <div id="positions-list"></div>
  </div>

  <!-- 自选 Tab -->
  <div class="tab-pane" id="tab-watchlist">
    <!-- 添加自选 -->
    <div class="add-bar mb-3">
      <div class="input-group">
        <input type="text" class="form-control" id="add-code"
               placeholder="输入股票代码（如 600487）" maxlength="6">
        <button class="btn btn-primary" onclick="addToWatchlist()">添加</button>
      </div>
    </div>
    <div id="watchlist-list"></div>
  </div>

  <!-- 扫描 Tab -->
  <div class="tab-pane" id="tab-scan">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted small" id="scan-date">最新扫描：--</span>
      <button class="btn btn-sm btn-outline-primary" onclick="triggerScan()">手动扫描</button>
    </div>
    <div id="scan-list"></div>
  </div>

  <!-- 账户 Tab -->
  <div class="tab-pane" id="tab-account">
    <div id="account-detail"></div>
  </div>

</div>

<!-- Toast 提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-body">操作成功</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
